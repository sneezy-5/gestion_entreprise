<!DOCTYPE html>
<html lang="fr"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <script src="zoom_fichiers/external_api.js"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <link rel="stylesheet" href="zoom_fichiers/style.css">
</head>
<body>

<button id="start" type="button">Commencer</button>
<div id="jitsi-container">
<iframe allow="camera; microphone; display-capture; autoplay; clipboard-write" src="https://meet.jit.si/jTe9xGjUmuVOZDSNTnREoZ0GqWULv8#jitsi_meet_external_api_id=0&amp;appData.localStorageContent=null" name="jitsiConferenceFrame0" id="jitsiConferenceFrame0" style="height: 600px; width: 100%; border: 0px none;" allowfullscreen="true"></iframe></div>

<script>
var button = document.querySelector('#start');
var container = document.querySelector('#jitsi-container');
var api = null;

button.addEventListener('click', () => {
    var possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var stringLength = 30;

    function pickRandom() {
    return possible[Math.floor(Math.random() * possible.length)];
    }

var randomString = Array.apply(null, Array(stringLength)).map(pickRandom).join('');

    var domain = "www.google.com";
    var options = {
        "roomName": randomString,
        "parentNode": container,
        "width": 800,
        "height": 800,
    };
    api = new JitsiMeetExternalAPI(domain, options);
});

</script>

</body></html>
